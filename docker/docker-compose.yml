# Compose stacks for the knowledge-layer backend.
#
# Two profiles:
#
#   1. ``dev``   — Neo4j + API. Used by the integration CI job and for
#                  local end-to-end work on a developer laptop.
#   2. ``deploy`` — Same Neo4j + API plus a ``cloudflared`` sidecar
#                  that exposes the API at the operator's chosen
#                  hostname (e.g. ``https://kw-api.benhelli.org``).
#                  See ``docs/runbook/workstation-deploy.md`` for the
#                  one-time tunnel setup.
#
# Quickstart (dev):
#   docker compose -f docker/docker-compose.yml --profile dev up -d
#
# Quickstart (workstation deploy):
#   docker compose -f docker/docker-compose.yml --profile deploy up -d

services:
  neo4j:
    image: neo4j:5.23-community
    container_name: kw-pipeline-neo4j
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/test_password_change_me
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    profiles: ["dev", "deploy"]
    restart: unless-stopped

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: kw-pipeline-api
    ports:
      # Host-exposed for ``dev`` so a host-side ``curl`` works. The
      # ``deploy`` profile keeps the port exposed too — cloudflared
      # talks to it via the docker network ("api" hostname) but local
      # access from the host stays handy for poking the Swagger UI.
      - "8000:8000"
    environment:
      KW_KNOWLEDGE_LAYER_ENABLED: "true"
      KW_NEO4J_URI: bolt://neo4j:7687
      KW_NEO4J_USER: neo4j
      KW_NEO4J_PASSWORD: test_password_change_me
      # Mirror the kw-demo allowlist so the deployed widget accepts the
      # full demo dataset (text + PDF + DOCX + PPTX). The Dockerfile
      # carries the same default, but pinning it in compose makes the
      # deploy contract explicit and easy to override per-tenant.
      KW_ALLOWED_CONTENT_TYPES: "text/plain,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.openxmlformats-officedocument.presentationml.presentation"
      # Accept any 3DEXPERIENCE on-cloud tenant origin so the deployed
      # widget can reach the API without enumerating every subdomain.
      # Override per-deployment if your tenant lives outside this
      # pattern.
      KW_CORS_ALLOWED_ORIGIN_REGEX: "^https://.*\\.3dexperience\\.3ds\\.com$$"
      # Optional API keys passed through from the host's ``.env`` file
      # so the workstation deploy can use the real Gemini / Anthropic /
      # Voyage paths without baking secrets into the image.
      # Provider selection follows KW_LLM_PROVIDER (default ``auto``,
      # which prefers Gemini when its key is set; see ADR-013 §6).
      KW_LLM_PROVIDER: "${KW_LLM_PROVIDER:-auto}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      KW_GEMINI_MODEL: "${KW_GEMINI_MODEL:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      VOYAGE_API_KEY: "${VOYAGE_API_KEY:-}"
    volumes:
      # Persist SQLite catalog + raw uploads across container restarts.
      # The Dockerfile defaults ``KW_DATA_DIR=/data`` so this matches.
      - api_data:/data
    depends_on:
      neo4j:
        condition: service_healthy
    profiles: ["dev", "deploy"]
    restart: unless-stopped

  # ── Workstation deployment sidecar (``deploy`` profile only) ──────
  #
  # The cloudflared connector calls outbound to Cloudflare's edge so
  # no port forwarding / public IP is required on the workstation.
  # See docs/runbook/workstation-deploy.md for the one-time
  # ``cloudflared tunnel login`` + ``tunnel route dns`` setup.
  #
  # The mounted ``cloudflared/`` directory carries the operator's
  # tunnel credentials JSON + the config.yml that maps the public
  # hostname to the in-network ``http://api:8000``. Both files are
  # gitignored — see docker/cloudflared/.gitignore — so credentials
  # never land in source control.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: kw-pipeline-cloudflared
    command: ["tunnel", "--no-autoupdate", "run"]
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    depends_on:
      api:
        condition: service_started
    profiles: ["deploy"]
    restart: unless-stopped

volumes:
  neo4j_data:
  api_data:
