[project]
name = "kw-pipeline-api"
version = "0.1.0"
description = "Harvester API for KW Pipeline document ingestion and semantic extraction."
requires-python = ">=3.11"
dependencies = [
  "fastapi==0.115.6",
  "jinja2==3.1.6",
  "pydantic==2.10.6",
  "python-multipart>=0.0.9",
  "uvicorn==0.30.6",
]

[project.optional-dependencies]
test = [
  "httpx==0.28.1",
  "pytest==8.3.5",
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
