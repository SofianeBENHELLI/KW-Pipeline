<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3DX KnowledgeForge — preview</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        background: #f4f6f8;
        overflow: hidden;
      }
      /* The widget is a single fluid surface — same as inside a
         3DDashboard tile. The browser window IS the tile here, so
         resize the window to see the widget reflow. */
      #root {
        width: 100%;
        height: 100%;
        display: flex;
      }
      #root > * { flex: 1; min-width: 0; min-height: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
