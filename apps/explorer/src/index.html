<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:widget="http://www.netvibes.com/ns/">

<head>
  <meta http-equiv="content-type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="autoRefresh" content="0" />
  <title>3DX Knowledge Explorer</title>
  <script type="text/javascript">
    var uwaPath;
    try {
      uwaPath = widget.uwaUrl.substring(0, widget.uwaUrl.lastIndexOf("/") + 1);
    } catch (error) {
      uwaPath = "./";
    }
    var scriptElement = document.createElement("script");
    scriptElement.src = uwaPath + "main.js?v=" + Date.now();
    document.head.appendChild(scriptElement);
  </script>
</head>

<body>
  <div id="root"></div>
</body>

</html>
