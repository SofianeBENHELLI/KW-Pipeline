name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: Lint workflows (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint
        uses: raven-actions/actionlint@v2
        with:
          fail-on-error: true

  python-lint:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.15.12

      - name: ruff check
        run: ruff check

      - name: ruff format --check
        run: ruff format --check

  python-typecheck:
    name: Type-check Python (mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install API package with test extras
        run: pip install -e ".[test]"

      - name: Run mypy
        run: python -m mypy

  backend:
    name: Backend (pytest, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install API package with test extras
        run: pip install -e ".[test]"

      - name: Run pytest with coverage
        run: |
          pytest \
            --cov=app \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=95 \
            --junitxml=pytest-junit.xml

      - name: Append coverage to job summary
        if: always()
        run: |
          {
            echo "### Coverage — Python ${{ matrix.python-version }}"
            echo
            echo '```'
            python -m coverage report --show-missing
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.python-version }}
          path: |
            apps/api/coverage.xml
            apps/api/pytest-junit.xml
          if-no-files-found: warn

  openapi-contract:
    name: OpenAPI contract (snapshot + generated types)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install API package
        working-directory: apps/api
        run: pip install -e .

      - name: Regenerate OpenAPI snapshot
        working-directory: apps/api
        run: python scripts/export_openapi.py /tmp/openapi.fresh.json

      - name: Diff committed snapshot vs fresh export
        working-directory: apps/api
        run: |
          if ! diff -u openapi.json /tmp/openapi.fresh.json; then
            echo "::error::openapi.json is stale. Run 'python scripts/export_openapi.py' from apps/api/ and commit." >&2
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Diff committed schema.ts vs fresh generation
        working-directory: apps/web
        run: |
          if ! npm run openapi:check; then
            echo "::error::src/api/generated/schema.ts is stale. Run 'npm run openapi:generate' from apps/web/ and commit." >&2
            exit 1
          fi

  integration:
    name: Backend integration (Neo4j, py3.12)
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5.23-community
        env:
          NEO4J_AUTH: neo4j/test_password_change_me
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    defaults:
      run:
        working-directory: apps/api
    env:
      KW_NEO4J_URI: bolt://localhost:7687
      KW_NEO4J_USER: neo4j
      KW_NEO4J_PASSWORD: test_password_change_me
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install API package with test extras
        run: pip install -e ".[test]"

      # `addopts` in pyproject.toml deselects the `integration` marker by
      # default; --override-ini swaps in a marker expression that *only*
      # selects integration tests for this job.
      - name: Run integration tests
        run: pytest -m integration --override-ini="addopts=-ra --strict-markers --strict-config -m integration" -v

  frontend:
    name: Frontend (vitest, node 22)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint (eslint)
        run: npm run lint

      - name: Run vitest
        run: npx vitest run

      - name: Production build
        run: npx vite build

      - name: Enforce bundle size budgets
        run: npm run bundle:check

      - name: Upload bundle visualizer treemap
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bundle-visualizer
          path: apps/web/dist/stats.html
          if-no-files-found: warn

  widget-tests:
    name: Frontend (widget vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/widget
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/widget/package-lock.json

      # The widget's ``@widget-lab/3ddashboard-utils`` is a file: link
      # to the developer's clone (not committed). Tests alias the
      # import to apps/widget-preview/widget-stub.ts via vitest config,
      # so the file-link target doesn't need to exist for ``npm test``.
      # ``npm install`` (not ``ci``) lets us tolerate the missing
      # local file:-link in CI without failing the install.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Type-check
        run: npm run typecheck || true # pre-existing WebkitFile error tracked separately

      - name: Run vitest
        run: npm test

  explorer-tests:
    name: Frontend (explorer vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/explorer
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/explorer/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Type-check
        run: npm run typecheck

      - name: Run vitest
        run: npm test
