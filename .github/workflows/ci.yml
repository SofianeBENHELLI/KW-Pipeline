name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install API package with test extras
        run: pip install -e ".[test]"

      - name: Run pytest
        run: pytest

  frontend:
    name: Frontend (placeholder)
    runs-on: ubuntu-latest
    # Re-enable once #14 lands the apps/web scaffold (package.json, vitest, playwright).
    if: false
    steps:
      - run: echo "frontend tests are not yet wired"
