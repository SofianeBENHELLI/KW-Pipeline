name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: Lint workflows (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint
        uses: raven-actions/actionlint@v2
        with:
          fail-on-error: true

  python-lint:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.15.12

      - name: ruff check
        run: ruff check

      - name: ruff format --check
        run: ruff format --check

  backend:
    name: Backend (pytest, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install API package with test extras
        run: pip install -e ".[test]"

      - name: Run pytest with coverage
        run: |
          pytest \
            --cov=app \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=95 \
            --junitxml=pytest-junit.xml

      - name: Append coverage to job summary
        if: always()
        run: |
          {
            echo "### Coverage — Python ${{ matrix.python-version }}"
            echo
            echo '```'
            python -m coverage report --show-missing
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.python-version }}
          path: |
            apps/api/coverage.xml
            apps/api/pytest-junit.xml
          if-no-files-found: warn

  openapi-contract:
    name: OpenAPI contract (snapshot + generated types)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install API package
        working-directory: apps/api
        run: pip install -e .

      - name: Regenerate OpenAPI snapshot
        working-directory: apps/api
        run: python scripts/export_openapi.py /tmp/openapi.fresh.json

      - name: Diff committed snapshot vs fresh export
        working-directory: apps/api
        run: |
          if ! diff -u openapi.json /tmp/openapi.fresh.json; then
            echo "::error::openapi.json is stale. Run 'python scripts/export_openapi.py' from apps/api/ and commit." >&2
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Diff committed schema.ts vs fresh generation
        working-directory: apps/web
        run: |
          if ! npm run openapi:check; then
            echo "::error::src/api/generated/schema.ts is stale. Run 'npm run openapi:generate' from apps/web/ and commit." >&2
            exit 1
          fi

  frontend:
    name: Frontend (vitest, node 22)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Run vitest
        run: npx vitest run
